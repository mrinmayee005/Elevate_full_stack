<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeCare Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-[#080b18] text-slate-100">
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_top_left,rgba(59,130,246,.22),transparent_34%),radial-gradient(circle_at_bottom_right,rgba(168,85,247,.2),transparent_28%)]"></div>
    <main id="app" class="relative min-h-screen"></main>
    <template id="home-template">
      <section class="home-hero relative min-h-screen overflow-hidden">
        <img class="absolute inset-0 h-full w-full object-cover" src="https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1800&q=80" alt="Modern hospital building" />
        <div class="absolute inset-0 bg-slate-950/60"></div>
        <div class="relative mx-auto flex min-h-screen max-w-6xl flex-col justify-center px-4 py-10">
          <p class="text-sm uppercase tracking-[.28em] text-cyan-200">Smart Multilingual Care</p>
          <h1 class="mt-3 max-w-3xl text-5xl font-black leading-tight text-white md:text-7xl">LifeCare Hospital</h1>
          <p class="mt-5 max-w-2xl text-lg text-slate-100">A connected care platform for appointments, records, emergency alerts, patient guidance, and hospital operations.</p>
          <div class="mt-8 flex flex-wrap gap-3">
            <button id="home-login" class="btn">Login</button>
            <button id="home-signup" class="btn secondary">Signup</button>
          </div>
        </div>
      </section>
    </template>
    <template id="auth-template">
      <section class="mx-auto flex min-h-screen max-w-6xl items-center px-4 py-8">
        <div class="grid w-full gap-6 lg:grid-cols-[1fr_420px]">
          <div class="flex flex-col justify-center">
            <p class="text-sm uppercase tracking-[.28em] text-cyan-300">Smart Hospital Ecosystem</p>
            <h1 class="mt-3 text-5xl font-black leading-tight md:text-7xl">LifeCare Hospital</h1>
            <p class="mt-5 max-w-2xl text-lg text-slate-300">Role-based care operations for doctors, nurses, patients, and administrators with live queueing, medical document analysis, records, and alerts.</p>
            <div class="mt-8 grid gap-3 sm:grid-cols-3">
              <div class="glass p-4"><strong>Realtime</strong><span>Queue, chat, alerts</span></div>
              <div class="glass p-4"><strong>Smart summaries</strong><span>Reports and prescriptions</span></div>
              <div class="glass p-4"><strong>Multilingual</strong><span>8 language support</span></div>
            </div>
          </div>
          <form id="auth-form" class="glass p-5">
            <div class="mb-5 flex rounded-lg bg-white/5 p-1">
              <button type="button" data-mode="login" class="mode-btn active flex-1 rounded-md px-3 py-2">Login</button>
              <button type="button" data-mode="signup" class="mode-btn flex-1 rounded-md px-3 py-2">Signup</button>
            </div>
            <div id="signup-fields" class="hidden">
              <label>Name<input name="name" class="input" /></label>
              <label>Role<select name="role" class="input"><option>patient</option><option>doctor</option><option>nurse</option></select></label>
              <div id="role-fields"></div>
            </div>
            <label>Email or admin username<input name="identity" class="input" placeholder="admin or user@email.com" required /></label>
            <label>Password<input name="password" type="password" class="input" required /></label>
            <label>Language<select name="language" class="input"><option>English</option><option>Hindi</option><option>Marathi</option><option>Gujarati</option><option>Tamil</option><option>Telugu</option><option>Kannada</option><option>Bengali</option></select></label>
            <button class="mt-4 w-full rounded-lg bg-cyan-400 px-4 py-3 font-bold text-slate-950 hover:bg-cyan-300">Continue</button>
            <p id="auth-error" class="mt-3 min-h-6 text-sm text-rose-300"></p>
          </form>
        </div>
      </section>
    </template>
    <script src="./app.js"></script>
  </body>
</html>
